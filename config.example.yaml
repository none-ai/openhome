# 配置文件示例
# 复制此文件为 config.yaml 并修改为你自己的信息

# GitHub用户名（用于获取公开的仓库信息）
github_username: "octocat"

# GitHub Token（可选，用于提高API调用限制）
# 在 GitHub 设置 -> Developer settings -> Personal access tokens 生成
# github_token: "ghp_xxxxxxxxxxxx"

# 服务器端口号
port: 8004

# 个人博客RSS订阅源（可多个）
rss_feeds:
  - url: "https://example.com/blog/feed.xml"
    name: "我的博客"

# 个人简介
bio:
  name: "Your Name"
  title: "Developer & Creator"
  description: "A passionate developer building cool things."
  avatar: "/static/avatar.png"

# 社交链接
social:
  github: "your-github-username"
  email: "your@email.com"
  twitter: "your-twitter"
  linkedin: "your-linkedin"
  bluesky: "your-bluesky"

# 技能标签（显示在个人简介下方）
skills:
  - "Python"
  - "JavaScript"
  - "React"
  - "Node.js"
  - "Docker"

# GitHub OAuth 登录配置（可选）
# 1. 在 GitHub Settings -> Developer settings -> OAuth Apps 创建新应用
# 2. 设置 Homepage URL 为你的网站地址
# 3. 设置 Authorization callback URL 为 your-site-url/callback
# 4. 将生成的 Client ID 和 Client Secret 填入下方
oauth:
  github_client_id: ""
  github_client_secret: ""

# Session secret key（生产环境请使用复杂的随机字符串）
# session_secret: "your-secret-key-here"
